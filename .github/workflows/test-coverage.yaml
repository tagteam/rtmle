name: test-coverage

on:
  push:
    branches: [main, master]
  pull_request:

# Opt in early to Node 24 (recommended)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # Install dependencies (including covr)
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: covr
          needs: coverage

      # Run coverage
      - name: Test coverage
        run: covr::codecov()
        shell: Rscript {0}